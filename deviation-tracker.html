
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>偏差値推移予測 — プラトン 戦略管理システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --ink:#1a1a2e; --ink-light:#2d2d4e;
  --paper:#f5f0e8; --paper-dark:#ede8dc;
  --accent:#c84b31; --accent-soft:#e8735a;
  --gold:#c9a84c; --teal:#2a7f6f; --teal-light:#3aa88f;
  --text:#2c2c3e; --text-muted:#6b6b80;
  --border:#d8d0c0; --white:#fff;
  --shadow:0 4px 24px rgba(26,26,46,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--paper);color:var(--text);min-height:100vh;}

/* Header */
header{background:var(--ink);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:36px;height:36px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;color:white;font-size:14px;font-weight:500;}
.logo-text{font-family:'Noto Serif JP',serif;color:white;font-size:14px;font-weight:600;letter-spacing:.04em;}
.logo-sub{color:var(--gold);font-size:9px;font-weight:300;letter-spacing:.1em;display:block;margin-top:1px;}
.header-badge{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:6px 14px;color:rgba(255,255,255,.7);font-size:11px;font-weight:500;}

/* Container */
.container{max-width:1100px;margin:0 auto;padding:2rem;}

/* Card */
.card{background:white;border-radius:14px;padding:1.8rem;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:1.5rem;}
.card-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:1rem;}

/* Section */
.section-title{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;color:var(--ink);margin-bottom:4px;display:flex;align-items:center;gap:10px;}
.section-title::before{content:'';display:inline-block;width:4px;height:24px;background:var(--accent);border-radius:2px;}
.section-desc{color:var(--text-muted);font-size:13px;margin-bottom:2rem;padding-left:14px;}

/* Form */
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1rem;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group label{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;}
.form-group input,.form-group select{border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;font-family:inherit;color:var(--text);background:var(--paper);outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus{border-color:var(--teal);}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem;}
.stat-card{border-radius:12px;padding:1rem;text-align:center;}
.stat-card .label{font-size:9px;font-weight:700;color:var(--text-muted);letter-spacing:.06em;margin-bottom:4px;}
.stat-card .value{font-size:36px;font-weight:700;font-family:'Noto Serif JP',serif;line-height:1.1;}

/* Button */
.btn{border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn-primary{background:var(--accent);color:white;}
.btn-primary:hover{background:var(--accent-soft);}
.btn-teal{background:var(--teal);color:white;}
.btn-teal:hover{background:var(--teal-light);}
.btn-secondary{background:var(--paper-dark);color:var(--text);border:1.5px solid var(--border);}

/* Monthly input */
.month-input-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;}
.month-entry{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--paper);border-radius:8px;border:1.5px solid var(--border);}
.month-entry .mlabel{font-size:12px;font-weight:700;color:var(--ink);min-width:70px;}
.month-entry input{flex:1;border:1.5px solid var(--border);border-radius:6px;padding:7px 10px;font-size:14px;font-family:'DM Mono',monospace;text-align:center;background:white;outline:none;max-width:80px;}
.month-entry input:focus{border-color:var(--teal);}
.month-entry .unit{font-size:11px;color:var(--text-muted);}
.month-entry.has-value{border-color:var(--teal);background:#e8f5f2;}

/* Chart */
.chart-wrap{height:320px;position:relative;}

/* Print */
@media print{
  header{position:relative!important;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
}
@media(max-width:640px){
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .container{padding:1rem;}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">Pt</div>
    <div>
      <span class="logo-text">プラトン 大学受験 戦略管理システム</span>
      <span class="logo-sub">DEVIATION VALUE PREDICTION TRACKER</span>
    </div>
  </div>
  <div class="header-badge">📊 偏差値推移予測ツール</div>
</header>

<div class="container">
  <!-- ===== 生徒情報入力 ===== -->
  <div class="section-title">偏差値推移予測シミュレーター</div>
  <div class="section-desc">生徒の現在の学力と目標を入力すると、受験期までの偏差値推移を自動予測します。毎月の実績を記録して精度を高めましょう。</div>

  <div class="card" id="card-input">
    <div class="card-title">📝 基本情報</div>
    <div class="form-row">
      <div class="form-group">
        <label>生徒名</label>
        <input type="text" id="inp-name" placeholder="例：田中 悠斗" value="">
      </div>
      <div class="form-group">
        <label>入塾時の偏差値</label>
        <input type="number" id="inp-initial" min="25" max="80" placeholder="例：45" value="">
      </div>
      <div class="form-group">
        <label>現在の偏差値（直近模試）</label>
        <input type="number" id="inp-current" min="25" max="80" placeholder="例：55" value="">
      </div>
      <div class="form-group">
        <label>合格目標偏差値</label>
        <input type="number" id="inp-target" min="30" max="80" placeholder="例：66" value="">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>受験予定年月</label>
        <input type="month" id="inp-exam-date" value="">
      </div>
      <div class="form-group">
        <label>志望校名</label>
        <input type="text" id="inp-univ" placeholder="例：一橋大学 経済学部" value="">
      </div>
      <div class="form-group" style="justify-content:flex-end;">
        <button class="btn btn-primary" onclick="generatePrediction()" style="width:100%;">📊 予測を生成する</button>
      </div>
    </div>
  </div>

  <!-- ===== 予測結果 ===== -->
  <div id="result-area" style="display:none;">

    <!-- KPI Cards -->
    <div class="stats-grid" id="kpi-cards">
      <div class="stat-card" style="background:var(--paper);">
        <div class="label">入塾時偏差値</div>
        <div class="value" style="color:var(--ink);" id="kpi-initial">—</div>
      </div>
      <div class="stat-card" style="background:var(--paper);">
        <div class="label">現在の推定偏差値</div>
        <div class="value" style="color:var(--teal);" id="kpi-current">—</div>
      </div>
      <div class="stat-card" style="background:var(--paper);">
        <div class="label">3ヶ月後の予測</div>
        <div class="value" style="color:var(--gold);" id="kpi-3month">—</div>
      </div>
      <div class="stat-card" style="background:linear-gradient(135deg,var(--ink),var(--ink-light));">
        <div class="label" style="color:rgba(255,255,255,.5);">合格目標偏差値</div>
        <div class="value" style="color:var(--gold);" id="kpi-target">—</div>
      </div>
    </div>

    <!-- Chart -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;">
        <div class="card-title" style="margin-bottom:0;">受験期までの偏差値推移予測</div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-secondary" onclick="window.print()" style="font-size:12px;">📄 PDF保存</button>
          <button class="btn btn-secondary" onclick="resetAll()" style="font-size:12px;">🔄 リセット</button>
        </div>
      </div>
      <div id="student-banner" style="background:var(--paper);border-radius:8px;padding:10px 16px;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text-muted);"></div>
      <div class="chart-wrap"><canvas id="main-chart"></canvas></div>
    </div>

    <!-- 月次実績入力 -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;">
        <div class="card-title" style="margin-bottom:0;">📋 月次実績の入力</div>
        <div style="font-size:11px;color:var(--text-muted);">模試や実力テストの偏差値を記録すると、グラフに実績線が追加されます</div>
      </div>
      <div class="month-input-grid" id="month-inputs"></div>
      <div style="margin-top:1rem;text-align:right;">
        <button class="btn btn-teal" onclick="updateActuals()">📊 実績をグラフに反映</button>
      </div>
    </div>

    <!-- 分析コメント -->
    <div class="card" id="analysis-card" style="display:none;">
      <div class="card-title">📊 分析コメント</div>
      <div id="analysis-content" style="font-size:14px;line-height:1.9;color:var(--ink);"></div>
    </div>
  </div>
</div>

<script>
var _state = {
  name:'', initial:0, current:0, target:0, univ:'',
  examYear:0, examMonth:0, months:0,
  labels:[], forecast:[], actuals:{},
};
var _chartInst = null;

// ===== データ永続化（localStorage）=====
var _DT_STORAGE_KEY = 'platon_devtracker_state';

function _dtSaveState() {
  try {
    localStorage.setItem(_DT_STORAGE_KEY, JSON.stringify(_state));
  } catch(e) { console.warn('[DT] Save failed:', e); }
}

function _dtRestoreState() {
  try {
    var raw = localStorage.getItem(_DT_STORAGE_KEY);
    if (!raw) return false;
    var saved = JSON.parse(raw);
    if (!saved || !saved.name || !saved.target) return false;
    _state = saved;
    // フォームに復元
    var el;
    el = document.getElementById('inp-name');    if (el) el.value = _state.name || '';
    el = document.getElementById('inp-initial'); if (el) el.value = _state.initial || '';
    el = document.getElementById('inp-current'); if (el) el.value = _state.current || '';
    el = document.getElementById('inp-target');  if (el) el.value = _state.target || '';
    el = document.getElementById('inp-univ');    if (el) el.value = _state.univ || '';
    if (_state.examYear && _state.examMonth) {
      el = document.getElementById('inp-exam-date');
      if (el) el.value = _state.examYear + '-' + String(_state.examMonth).padStart(2, '0');
    }
    // 予測が生成済みならUIを復元
    if (_state.labels && _state.labels.length > 0) {
      document.getElementById('result-area').style.display = 'block';
      _dtRenderKPI();
      _dtRenderBanner();
      renderMonthInputs();
      buildChart();
      renderAnalysis();
    }
    return true;
  } catch(e) { console.warn('[DT] Load failed:', e); return false; }
}

function _dtRenderKPI() {
  document.getElementById('kpi-initial').textContent = _state.initial;
  document.getElementById('kpi-current').textContent = _state.current;
  document.getElementById('kpi-target').textContent = _state.target;
  var pred3 = _state.months >= 3
    ? _state.forecast[Math.min(3, _state.forecast.length - 1)]
    : _state.forecast[_state.forecast.length - 1];
  document.getElementById('kpi-3month').textContent = pred3 || '—';
}

function _dtRenderBanner() {
  document.getElementById('student-banner').innerHTML =
    '<span>👤 <strong>' + _state.name + '</strong></span>'
    + '<span>🏫 ' + (_state.univ || '—') + '</span>'
    + '<span>🎯 目標偏差値 ' + _state.target + '</span>'
    + '<span>📅 受験まで ' + _state.months + 'ヶ月</span>';
}

// ページ読込時に自動復元
document.addEventListener('DOMContentLoaded', function() {
  _dtRestoreState();
});

function generatePrediction() {
  var name = document.getElementById('inp-name').value.trim() || '生徒';
  var initial = parseInt(document.getElementById('inp-initial').value) || 50;
  var current = parseInt(document.getElementById('inp-current').value) || initial;
  var target = parseInt(document.getElementById('inp-target').value) || 65;
  var examDate = document.getElementById('inp-exam-date').value;
  var univ = document.getElementById('inp-univ').value.trim() || '';

  if (!examDate) { alert('受験予定年月を入力してください'); return; }
  var ep = examDate.split('-');
  var examY = parseInt(ep[0]), examM = parseInt(ep[1]);

  var now = new Date();
  var nowY = now.getFullYear(), nowM = now.getMonth() + 1;
  var months = (examY - nowY) * 12 + (examM - nowM);
  if (months < 1) { alert('受験日は今月以降を指定してください'); return; }
  months = Math.min(months, 24);

  _state = { name:name, initial:initial, current:current, target:target, univ:univ,
    examYear:examY, examMonth:examM, months:months, labels:[], forecast:[], actuals:{} };

  // Labels & forecast
  for (var i = 0; i <= months; i++) {
    var d = new Date(nowY, nowM - 1 + i, 1);
    _state.labels.push(d.getFullYear() + '/' + (d.getMonth()+1) + '月');
    var p = i / months;
    _state.forecast.push(Math.round(current + (target - current) * Math.pow(p, 0.65)));
  }

  // Restore actuals from existing month inputs (if any)
  document.querySelectorAll('.me-input').forEach(function(el) {
    var v = parseInt(el.value);
    if (!isNaN(v) && v > 0) _state.actuals[el.dataset.midx] = v;
  });

  // KPIs
  document.getElementById('kpi-initial').textContent = initial;
  document.getElementById('kpi-current').textContent = current;
  document.getElementById('kpi-target').textContent = target;
  var pred3 = _state.forecast[Math.min(3, _state.forecast.length - 1)];
  document.getElementById('kpi-3month').textContent = pred3;

  // Banner
  var bannerParts = ['<strong>' + name + '</strong>'];
  if (univ) bannerParts.push('志望：' + univ);
  bannerParts.push('偏差値 ' + current + ' → 目標 ' + target + '（差 +' + (target - current) + '）');
  bannerParts.push('受験まで <strong>' + months + 'ヶ月</strong>');
  document.getElementById('student-banner').innerHTML = bannerParts.join('　｜　');

  // Month inputs
  renderMonthInputs();

  // Show
  document.getElementById('result-area').style.display = 'block';

  // Chart
  buildChart();

  // Analysis
  renderAnalysis();

  // Scroll
  document.getElementById('result-area').scrollIntoView({behavior:'smooth'});

  // 自動保存
  _dtSaveState();
}

function renderMonthInputs() {
  var html = '';
  for (var i = 0; i <= _state.months; i++) {
    var existing = _state.actuals[i];
    var hasVal = existing !== undefined && existing !== null;
    html += '<div class="month-entry' + (hasVal ? ' has-value' : '') + '">'
      + '<span class="mlabel">' + _state.labels[i] + '</span>'
      + '<input type="number" class="me-input" data-midx="' + i + '" min="25" max="80" placeholder="—"'
      + (hasVal ? ' value="' + existing + '"' : '')
      + ' oninput="onMonthInput(this)">'
      + '<span class="unit">偏差値</span>'
      + '</div>';
  }
  document.getElementById('month-inputs').innerHTML = html;
}

function onMonthInput(el) {
  var entry = el.closest('.month-entry');
  if (el.value && parseInt(el.value) > 0) {
    entry.classList.add('has-value');
  } else {
    entry.classList.remove('has-value');
  }
}

function updateActuals() {
  _state.actuals = {};
  document.querySelectorAll('.me-input').forEach(function(el) {
    var v = parseInt(el.value);
    if (!isNaN(v) && v > 0) _state.actuals[parseInt(el.dataset.midx)] = v;
  });

  // 最新の実績でKPI更新
  var latestActual = null, latestIdx = -1;
  Object.keys(_state.actuals).forEach(function(k) {
    var idx = parseInt(k);
    if (idx > latestIdx) { latestIdx = idx; latestActual = _state.actuals[k]; }
  });
  if (latestActual !== null) {
    document.getElementById('kpi-current').textContent = latestActual;
    // 3ヶ月後予測を実績ベースで再計算
    var remaining = _state.months - latestIdx;
    var pred3 = remaining > 0
      ? Math.round(latestActual + (_state.target - latestActual) * Math.pow(Math.min(3, remaining) / remaining, 0.65))
      : latestActual;
    document.getElementById('kpi-3month').textContent = pred3;
  }

  buildChart();
  renderAnalysis();
  renderMonthInputs(); // スタイル更新

  // 自動保存
  _dtSaveState();
}

function buildChart() {
  var canvas = document.getElementById('main-chart');
  if (!canvas) return;
  if (_chartInst) { _chartInst.destroy(); _chartInst = null; }

  var actualData = _state.labels.map(function(_, i) {
    return _state.actuals[i] !== undefined ? _state.actuals[i] : null;
  });

  var minVal = Math.min(_state.initial, _state.current) - 5;
  var maxVal = Math.max(_state.target + 5, 75);

  _chartInst = new Chart(canvas, {
    type: 'line',
    data: {
      labels: _state.labels,
      datasets: [
        {
          label: '予測推移',
          data: _state.forecast,
          borderColor: '#2a7f6f',
          backgroundColor: 'rgba(42,127,111,.08)',
          borderWidth: 2,
          pointRadius: 4,
          pointBackgroundColor: '#2a7f6f',
          tension: 0.4,
          fill: true,
        },
        {
          label: '目標 ' + _state.target,
          data: Array(_state.labels.length).fill(_state.target),
          borderColor: '#c84b31',
          borderWidth: 1.5,
          borderDash: [6, 4],
          pointRadius: 0,
          fill: false,
        },
        {
          label: '実績',
          data: actualData,
          borderColor: '#c9a84c',
          backgroundColor: '#c9a84c',
          borderWidth: 2.5,
          pointRadius: 7,
          pointBackgroundColor: '#c9a84c',
          pointBorderColor: '#fff',
          pointBorderWidth: 2,
          tension: 0.3,
          fill: false,
          spanGaps: false,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: { font: { family: "'Noto Sans JP',sans-serif", size: 11 }, boxWidth: 14, padding: 16 }
        },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              if (ctx.raw === null) return null;
              return ctx.dataset.label + '：' + ctx.raw;
            }
          }
        }
      },
      scales: {
        y: {
          min: Math.max(25, minVal),
          max: Math.min(82, maxVal),
          grid: { color: 'rgba(0,0,0,.05)' },
          ticks: { font: { family: "'Noto Sans JP',sans-serif", size: 10 } }
        },
        x: {
          grid: { color: 'rgba(0,0,0,.03)' },
          ticks: { font: { family: "'Noto Sans JP',sans-serif", size: 10 }, maxRotation: 45 }
        }
      }
    }
  });
}

function renderAnalysis() {
  var card = document.getElementById('analysis-card');
  var el = document.getElementById('analysis-content');
  var gap = _state.target - _state.current;
  var monthsPerPoint = gap > 0 ? (_state.months / gap).toFixed(1) : '—';
  var actualCount = Object.keys(_state.actuals).length;

  var html = '<div style="background:var(--paper);border-left:4px solid var(--gold);border-radius:0 10px 10px 0;padding:1rem 1.2rem;margin-bottom:1rem;">';
  html += '<div style="font-size:12px;font-weight:700;color:var(--gold);margin-bottom:6px;">📋 予測サマリー</div>';
  html += '<div style="font-size:13px;line-height:1.9;">';
  html += '<strong>' + _state.name + '</strong> さんは、';
  if (_state.univ) html += '志望校 <strong>' + _state.univ + '</strong>（目標偏差値 ' + _state.target + '）に向けて、';
  html += '現在の偏差値 <strong>' + _state.current + '</strong> から <strong>+' + gap + '</strong> の上昇が必要です。<br>';
  html += '受験まで <strong>' + _state.months + 'ヶ月</strong>。偏差値1ポイントあたり約 <strong>' + monthsPerPoint + 'ヶ月</strong> のペースが目安です。';

  if (gap <= 5) {
    html += '<br><span style="color:var(--teal);font-weight:700;">✅ 目標偏差値との差が小さく、現在のペースを維持すれば合格圏内です。</span>';
  } else if (gap <= 12) {
    html += '<br><span style="color:var(--gold);font-weight:700;">⚡ 着実な積み上げで十分到達可能な範囲です。毎月の実力テストで進捗を確認しましょう。</span>';
  } else {
    html += '<br><span style="color:var(--accent);font-weight:700;">🔥 挑戦的な目標です。基礎固めを最優先に、毎日課題サービスをフル活用してください。</span>';
  }
  html += '</div></div>';

  // 実績がある場合の分析
  if (actualCount > 0) {
    var latestIdx = -1, latestVal = 0;
    Object.keys(_state.actuals).forEach(function(k) {
      var idx = parseInt(k);
      if (idx > latestIdx) { latestIdx = idx; latestVal = _state.actuals[k]; }
    });
    var diff = latestVal - _state.current;
    var vs = latestVal - _state.forecast[latestIdx];

    html += '<div style="background:#e8f5f2;border-left:4px solid var(--teal);border-radius:0 10px 10px 0;padding:1rem 1.2rem;">';
    html += '<div style="font-size:12px;font-weight:700;color:var(--teal);margin-bottom:6px;">📈 実績分析（' + actualCount + '件の記録）</div>';
    html += '<div style="font-size:13px;line-height:1.9;">';
    html += '最新実績：<strong>' + _state.labels[latestIdx] + '</strong> 時点で偏差値 <strong>' + latestVal + '</strong>';
    html += '（入力時比 <strong style="color:' + (diff >= 0 ? 'var(--teal)' : 'var(--accent)') + ';">' + (diff >= 0 ? '+' : '') + diff + '</strong>）<br>';
    html += '予測との比較：' + (vs >= 0 ? '<span style="color:var(--teal);font-weight:700;">予測を +' + vs + ' 上回っています 🎉</span>' : '<span style="color:var(--accent);font-weight:700;">予測を ' + vs + ' 下回っています。学習量の見直しを検討しましょう。</span>');
    html += '</div></div>';
  }

  el.innerHTML = html;
  card.style.display = 'block';
}

function resetAll() {
  if (!confirm('すべてのデータをリセットしますか？')) return;
  _state = { name:'', initial:0, current:0, target:0, univ:'', examYear:0, examMonth:0, months:0, labels:[], forecast:[], actuals:{} };
  if (_chartInst) { _chartInst.destroy(); _chartInst = null; }
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-initial').value = '';
  document.getElementById('inp-current').value = '';
  document.getElementById('inp-target').value = '';
  document.getElementById('inp-exam-date').value = '';
  document.getElementById('inp-univ').value = '';
  // 保存データも削除
  try { localStorage.removeItem(_DT_STORAGE_KEY); } catch(e) {}
}

// デフォルト受験日を来年2月に設定
(function() {
  var now = new Date();
  var y = now.getMonth() >= 3 ? now.getFullYear() + 1 : now.getFullYear();
  document.getElementById('inp-exam-date').value = y + '-02';
})();
</script>
